version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo_data:/data/db

  # compooss:
  #   build: .
  #   container_name: compooss
  #   depends_on:
  #     - mongo
  #   environment:
  #     - MONGO_URI=mongodb://root:example@mongo:27017/?authSource=admin
  #   ports:
  #     - "8080:3000"

volumes:
  mongo_data:
